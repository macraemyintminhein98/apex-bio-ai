<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioGenius AI</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; font-family: sans-serif; }
        .container { max-width: 768px; margin: 2rem auto; padding: 2rem; background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #333; font-size: 2.25rem; font-weight: bold; text-align: center; margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; color: #555; }
        input, select, textarea { width: 100%; padding: 0.75rem; margin-bottom: 1rem; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #3b82f6; color: white; padding: 0.75rem 1.5rem; border-radius: 4px; border: none; cursor: pointer; font-size: 1rem; transition: background-color 0.2s; }
        button:hover { background-color: #2563eb; }
        #result { margin-top: 1.5rem; padding: 1rem; background: #e0f2fe; border-left: 4px solid #3b82f6; border-radius: 4px; white-space: pre-wrap; word-wrap: break-word; }
        .price { text-align: center; font-size: 1.5rem; margin-top: 1.5rem; color: #10b981; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>BioGenius AI</h1>
        <p class="text-center text-gray-600 mb-6">Craft the perfect Instagram bio with AI instant generation.</p>
        <form id="bioForm">
            <label for="keywords">Keywords (e.g., entrepreneur, travel, fitness):</label>
            <input type="text" id="keywords" name="keywords" placeholder="Separate with commas" required>
            
            <label for="tone">Tone:</label>
            <select id="tone" name="tone" required>
                <option value="professional">Professional</option>
                <option value="funny">Funny</option>
                <option value="aesthetic">Aesthetic</option>
                <option value="inspirational">Inspirational</option>
                <option value="creative">Creative</option>
            </select>
            
            <button type="submit">Generate Bio</button>
        </form>

        <div class="price mt-8">Get Your Perfect Bio for just $<span id="productPrice">9.99</span></div>

        <div id="result" class="hidden">
            <h2 class="font-bold text-lg mb-2">Your AI-Generated Bio:</h2>
            <p id="generatedBio"></p>
        </div>
    </div>

    <script>
        document.getElementById('bioForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const keywords = document.getElementById('keywords').value;
            const tone = document.getElementById('tone').value;
            const generateButton = document.querySelector('button[type="submit"]');
            const originalButtonText = generateButton.textContent;
            generateButton.textContent = 'Generating...';
            generateButton.disabled = true;

            // This is a placeholder. In a real app, this would hit your Vercel Function.
            // For this MVP, we'll simulate a response.
            setTimeout(() => {
                let bio = ``;
                if (tone === 'professional') {
                    bio = `[Your Name/Brand] | ${keywords.split(',')[0].trim().charAt(0).toUpperCase() + keywords.split(',')[0].trim().slice(1)} Expert. Helping you achieve your goals. Connect for collabs.`;
                } else if (tone === 'funny') {
                    bio = `Warning: May spontaneously start talking about ${keywords.split(',')[0].trim()}. Probably running on coffee and a dream. 😂`;
                } else if (tone === 'aesthetic') {
                    bio = `🌌 Dreamer & Creator. Finding beauty in ${keywords.split(',')[0].trim() || 'simple moments'}. Sharing my visual journey. ✨`;
                } else {
                    bio = `AI-crafted bio for: ${keywords}. Tone: ${tone}. Follow my journey!`;
                }
                document.getElementById('generatedBio').textContent = bio;
                document.getElementById('result').classList.remove('hidden');
                generateButton.textContent = originalButtonText;
                generateButton.disabled = false;

                // In a real app, this is where you'd trigger Stripe Checkout after a successful generation or as a pre-requisite.
                // For demo, we just show the output.
                // Example: initiateStripeCheckout(keywords, tone, bio_id);
            }, 1500);
        });
    </script>
</body>
</html>
